services:
  tranz4:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tranz4
    restart: unless-stopped
    ports:
      - "3010:3000"
    environment:
      PORT: "3000"
      BASE_URL: "https://tranz4.org"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_EXPIRES_IN: "${JWT_EXPIRES_IN:-1h}"
      UPLOAD_DIR: "/data/uploads"
    volumes:
      - /mnt/media/transfers/uploads:/data/uploads